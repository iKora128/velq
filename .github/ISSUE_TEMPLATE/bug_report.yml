name: Bug report
description: Something broke or behaves wrong
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Velq version
      description: Shown in the app menu → About Velq, or the release you downloaded.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a folder with …
        2. Click …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected, and what happened instead
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: DevTools console output, crash text, or a screenshot if it's visual.
