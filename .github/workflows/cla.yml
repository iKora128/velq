name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".cla/signatures-v1.json"
          path-to-document: "https://github.com/iKora128/velq/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "iKora128,dependabot[bot]"
          custom-notsigned-prcomment: >
            Thanks for the contribution! Before we can merge, please read the
            [Contributor License Agreement](https://github.com/iKora128/velq/blob/main/CLA.md)
            and sign it by replying with the comment below.
